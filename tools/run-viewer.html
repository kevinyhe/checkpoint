<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>checkpoint Run Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0e1116;
        color: #eef2f6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(360px, 560px) minmax(520px, 1fr);
        gap: 20px;
        padding: 20px;
        box-sizing: border-box;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 24px;
        line-height: 1.2;
        margin-bottom: 6px;
      }

      h2 {
        font-size: 14px;
        color: #a9b4c4;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      p {
        color: #aeb8c7;
        line-height: 1.5;
      }

      button,
      select {
        border: 1px solid #303847;
        border-radius: 6px;
        background: #171d27;
        color: #eef2f6;
        font: inherit;
        padding: 9px 11px;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        background: #66a3ff;
        border-color: #66a3ff;
        color: #07111f;
        font-weight: 700;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .panel {
        background: #141922;
        border: 1px solid #2b3340;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 14px;
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        color: #aeb8c7;
      }

      .overlay-stage,
      #screen,
      #ghostOverlay,
      .grid-screen {
        width: 100%;
        aspect-ratio: 256 / 240;
      }

      .overlay-stage {
        position: relative;
        max-width: 960px;
      }

      #screen,
      #ghostOverlay,
      .grid-screen {
        background: #030405;
        border: 1px solid #2b3340;
        image-rendering: pixelated;
        display: block;
      }

      #screen,
      #ghostOverlay {
        position: absolute;
        inset: 0;
        height: 100%;
      }

      #ghostOverlay {
        background: transparent;
        pointer-events: none;
      }

      .event-popup-layer {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        overflow: hidden;
      }

      .event-popup {
        position: absolute;
        right: 8px;
        max-width: min(210px, calc(100% - 18px));
        min-width: 118px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-left: 4px solid #66a3ff;
        border-radius: 6px;
        background: rgba(8, 12, 18, 0.86);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.38);
        color: #eef2f6;
        padding: 7px 9px;
        backdrop-filter: blur(4px);
        animation: popup-in 150ms ease-out;
      }

      .event-popup.good {
        border-left-color: #78dba9;
      }

      .event-popup.warning {
        border-left-color: #ffd166;
      }

      .event-popup.bad {
        border-left-color: #ff8b8b;
      }

      .event-popup strong {
        display: block;
        font-size: 12px;
        line-height: 1.25;
      }

      .event-popup span {
        display: block;
        margin-top: 2px;
        color: #c9d3e0;
        font-size: 11px;
        line-height: 1.25;
      }

      @keyframes popup-in {
        from {
          opacity: 0;
          transform: translateX(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }

      .overlay-legend {
        display: grid;
        gap: 8px;
      }

      .overlay-legend-item {
        display: grid;
        grid-template-columns: 14px 1fr;
        gap: 8px;
        align-items: start;
        color: #aeb8c7;
        font-size: 12px;
        line-height: 1.35;
      }

      .overlay-legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        margin-top: 2px;
      }

      .overlay-legend-title {
        color: #eef2f6;
        font-weight: 700;
      }

      .overlay-legend-meta {
        color: #8894a5;
        font-variant-numeric: tabular-nums;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        background: #10151d;
        border: 1px solid #27303d;
        border-radius: 6px;
        padding: 10px;
      }

      .metric span {
        display: block;
        color: #8894a5;
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 3px;
        font-size: 18px;
        font-variant-numeric: tabular-nums;
      }

      .pill-list,
      .buttons {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .pill,
      .controller-button {
        border-radius: 999px;
        background: #232b36;
        color: #c9d3e0;
        padding: 5px 8px;
        font-size: 12px;
      }

      .controller-button.active {
        background: #66a3ff;
        color: #07111f;
        font-weight: 700;
      }

      .ai-context {
        display: grid;
        gap: 12px;
      }

      .ai-intent {
        background: #10151d;
        border: 1px solid #27303d;
        border-radius: 6px;
        padding: 10px;
        color: #eef2f6;
        font-size: 13px;
        line-height: 1.4;
      }

      .ai-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .ai-cell {
        background: #10151d;
        border: 1px solid #27303d;
        border-radius: 6px;
        padding: 8px;
      }

      .ai-cell span,
      .ai-event span {
        display: block;
        color: #8894a5;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .ai-cell strong {
        display: block;
        margin-top: 3px;
        color: #eef2f6;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        overflow-wrap: anywhere;
      }

      .ai-events {
        display: grid;
        gap: 7px;
      }

      .ai-event {
        border-left: 3px solid #66a3ff;
        background: #10151d;
        border-radius: 5px;
        padding: 7px 9px;
        color: #c9d3e0;
        font-size: 12px;
        line-height: 1.35;
      }

      .ai-event.warning {
        border-left-color: #ffd166;
      }

      .ai-event.bad {
        border-left-color: #ff8b8b;
      }

      .ai-event.good {
        border-left-color: #78dba9;
      }

      .finding {
        border: 1px solid #303847;
        border-radius: 8px;
        padding: 12px;
        background: #10151d;
      }

      .finding + .finding {
        margin-top: 10px;
      }

      .finding-title {
        display: flex;
        gap: 8px;
        justify-content: space-between;
        align-items: flex-start;
      }

      .severity {
        border-radius: 999px;
        padding: 3px 7px;
        font-size: 12px;
        text-transform: uppercase;
      }

      .severity.high {
        background: #ff6b6b;
        color: #160404;
      }

      .severity.medium {
        background: #ffd166;
        color: #1b1200;
      }

      .severity.low,
      .severity.info {
        background: #78dba9;
        color: #03140c;
      }

      .status-line {
        color: #aeb8c7;
      }

      .status-line.good {
        color: #78dba9;
      }

      .status-line.warn {
        color: #ffd166;
      }

      .status-line.bad {
        color: #ff8b8b;
      }

      .single-viewer {
        display: grid;
        gap: 14px;
      }

      .grid-viewer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .grid-tile {
        display: grid;
        gap: 8px;
        min-width: 0;
        background: #10151d;
        border: 1px solid #27303d;
        border-radius: 8px;
        padding: 8px;
      }

      .grid-tile.selected {
        border-color: #66a3ff;
        box-shadow: 0 0 0 1px #66a3ff inset;
      }

      .grid-tile-header {
        display: grid;
        gap: 3px;
      }

      .grid-title {
        color: #eef2f6;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .grid-meta {
        color: #8894a5;
        font-size: 12px;
        line-height: 1.35;
        font-variant-numeric: tabular-nums;
      }

      .grid-placeholder {
        display: grid;
        place-items: center;
        min-height: 180px;
        border: 1px dashed #303847;
        color: #8894a5;
      }

      .hidden {
        display: none !important;
      }

      code {
        background: #232b36;
        border-radius: 4px;
        padding: 2px 5px;
      }

      @media (max-width: 1100px) {
        body {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>checkpoint Run Viewer</h1>
        <p id="runSummary">Loading run, ROM, and save state...</p>
        <div class="stack">
          <label>
            View
            <select id="viewModeSelect">
              <option value="single">Single replay</option>
              <option value="overlay" selected>Overlay trails</option>
              <option value="grid">Grid replays</option>
            </select>
          </label>
          <label>
            Session
            <select id="personaSelect"></select>
          </label>
          <label>
            Sort
            <select id="sortSelect">
              <option value="original">Original</option>
              <option value="score">Score</option>
              <option value="fastest">Fastest</option>
              <option value="game-score">Game Score</option>
              <option value="rooms">Rooms</option>
              <option value="progress">Progress</option>
              <option value="coverage">Coverage</option>
              <option value="findings">Findings</option>
              <option value="novelty">Novelty</option>
            </select>
          </label>
          <div class="row" id="gridControls">
            <label>
              Grid size
              <select id="gridSizeSelect">
                <option value="6" selected>6</option>
                <option value="12">12</option>
                <option value="18">18</option>
                <option value="24">24</option>
              </select>
            </label>
            <button id="prevBatchButton" disabled>Previous batch</button>
            <button id="nextBatchButton" disabled>Next batch</button>
          </div>
          <div class="row" id="overlayControls">
            <label>
              Ghosts
              <select id="overlayLimitSelect">
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="200">200</option>
                <option value="all">All</option>
              </select>
            </label>
            <label>
              Trail
              <select id="trailLengthSelect">
                <option value="30">0.5s</option>
                <option value="60">1s</option>
                <option value="120" selected>2s</option>
                <option value="240">4s</option>
                <option value="600">10s</option>
              </select>
            </label>
            <label>
              Opacity
              <select id="overlayOpacitySelect">
                <option value="0.45">Soft</option>
                <option value="0.65" selected>Medium</option>
                <option value="0.85">Bold</option>
              </select>
            </label>
            <label>
              Labels
              <select id="overlayLabelSelect">
                <option value="off">Off</option>
                <option value="selected">Selected only</option>
                <option value="first25" selected>First 25</option>
                <option value="all">All visible</option>
              </select>
            </label>
          </div>
          <div class="row">
            <button id="playPauseButton" class="primary" disabled>Play</button>
            <button id="resetButton" disabled>Reset</button>
            <button id="checkpointButton" disabled>Jump to checkpoint</button>
            <label>
              Speed
              <select id="speedSelect">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="4">4x</option>
              </select>
            </label>
          </div>
          <p id="statusLine" class="status-line">Preparing emulator.</p>
        </div>
      </section>

      <section class="panel">
        <h2>Run Metrics</h2>
        <div class="metrics">
          <div class="metric">
            <span>Frame</span><strong id="frameMetric">0</strong>
          </div>
          <div class="metric">
            <span>Time</span><strong id="timeMetric">0.00s</strong>
          </div>
          <div class="metric">
            <span>Progress</span><strong id="progressMetric">0</strong>
          </div>
          <div class="metric">
            <span>Status</span><strong id="statusMetric">-</strong>
          </div>
          <div class="metric">
            <span>Deaths</span><strong id="deathsMetric">0</strong>
          </div>
          <div class="metric">
            <span>Findings</span><strong id="findingsMetric">0</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Coverage</h2>
        <div id="coverageList" class="pill-list"></div>
      </section>

      <section class="panel">
        <h2>Current Buttons</h2>
        <div id="buttonList" class="buttons"></div>
      </section>

      <section class="panel">
        <h2>Replay View</h2>
        <p id="gridSummary">Loading episode grid...</p>
      </section>
    </main>

    <aside>
      <section id="singleViewer" class="single-viewer">
        <div class="overlay-stage">
          <canvas id="screen" width="256" height="240"></canvas>
          <canvas id="ghostOverlay" width="256" height="240"></canvas>
          <div id="eventPopupLayer" class="event-popup-layer"></div>
        </div>
      </section>

      <section class="panel">
        <h2>AI Moment</h2>
        <div class="ai-context">
          <div id="aiIntentLine" class="ai-intent">
            Waiting for replay state.
          </div>
          <div id="aiObservationGrid" class="ai-grid"></div>
          <div id="aiEventList" class="ai-events"></div>
        </div>
      </section>

      <section id="overlayLegendPanel" class="panel">
        <h2>Overlay Legend</h2>
        <div id="overlayLegend" class="overlay-legend"></div>
      </section>

      <section id="gridPanel" class="panel">
        <h2>Synced Episodes</h2>
        <div id="gridViewer" class="grid-viewer"></div>
      </section>

      <section class="panel">
        <h2>Findings</h2>
        <div id="findingsList"></div>
      </section>
    </aside>

    <script src="/vendor/jsnes.js"></script>
    <script>
      const BUTTONS = [
        "A",
        "B",
        "SELECT",
        "START",
        "UP",
        "DOWN",
        "LEFT",
        "RIGHT",
      ];
      const BUTTON_MAP = {
        A: jsnes.Controller.BUTTON_A,
        B: jsnes.Controller.BUTTON_B,
        SELECT: jsnes.Controller.BUTTON_SELECT,
        START: jsnes.Controller.BUTTON_START,
        UP: jsnes.Controller.BUTTON_UP,
        DOWN: jsnes.Controller.BUTTON_DOWN,
        LEFT: jsnes.Controller.BUTTON_LEFT,
        RIGHT: jsnes.Controller.BUTTON_RIGHT,
      };
      const SMB_RAM = {
        playerState: 0x000e,
        enemyTypes: 0x0016,
        playerFloatState: 0x001d,
        horizontalSpeed: 0x0057,
        levelPage: 0x006d,
        xOnScreen: 0x0086,
        verticalVelocity: 0x009f,
        yOnScreen: 0x00ce,
        areaMusic: 0x00fb,
        eventMusic: 0x00fc,
        soundEffect2: 0x00fe,
        soundEffect3: 0x00ff,
        tileBase: 0x0500,
        tileEnd: 0x069f,
        warpZoneControl: 0x06d6,
        changeAreaTimer: 0x06de,
        horizontalSpeedAbs: 0x0700,
        deathMusicLoaded: 0x0712,
        currentScreen: 0x071a,
        nextScreen: 0x071b,
        screenLeftX: 0x071c,
        playerHitDetectFlag: 0x0722,
        scrollLock: 0x0723,
        areaOffset: 0x0750,
        levelEntry: 0x0752,
        lives: 0x075a,
        preLevel: 0x075e,
        world: 0x075f,
        level: 0x0760,
        gameMode: 0x0770,
        levelLoading: 0x0772,
        scrollAmount: 0x0775,
        playerCollisionBits: 0x0490,
        enemyCollisionBits: 0x0491,
        scoreStart: 0x07dd,
        gameTimerHundreds: 0x07f8,
        gameTimerTens: 0x07f9,
        gameTimerOnes: 0x07fa,
      };
      const PLAYER_STATES = new Map([
        [0x00, "left-edge"],
        [0x01, "climbing-vine"],
        [0x02, "entering-reversed-l-pipe"],
        [0x03, "going-down-pipe"],
        [0x04, "autowalk"],
        [0x05, "autowalk"],
        [0x06, "player-dies"],
        [0x07, "entering-area"],
        [0x08, "normal"],
        [0x09, "small-to-large"],
        [0x0a, "large-to-small"],
        [0x0b, "dying"],
        [0x0c, "to-fire-mario"],
      ]);
      const VINE_TILES = new Set([0x08, 0x26, 0x56]);
      const PIPE_TILES = new Set([
        0x10, 0x11, 0x12, 0x13, 0x14, 0x15, 0x1c, 0x1d, 0x1e, 0x1f, 0x20, 0x21,
      ]);
      const HIDDEN_BLOCK_TILES = new Set([0x5f]);

      const canvas = document.getElementById("screen");
      const singleRenderer = createCanvasRenderer(canvas);
      const ghostOverlay = document.getElementById("ghostOverlay");
      const ghostContext = ghostOverlay.getContext("2d");
      let ghostDrawContext = ghostContext;
      const eventPopupLayer = document.getElementById("eventPopupLayer");
      const singleViewer = document.getElementById("singleViewer");
      const overlayLegendPanel = document.getElementById("overlayLegendPanel");
      const overlayLegend = document.getElementById("overlayLegend");
      const gridPanel = document.getElementById("gridPanel");
      const gridViewer = document.getElementById("gridViewer");
      const gridControls = document.getElementById("gridControls");
      const overlayControls = document.getElementById("overlayControls");
      const personaSelect = document.getElementById("personaSelect");
      const playPauseButton = document.getElementById("playPauseButton");
      const resetButton = document.getElementById("resetButton");
      const checkpointButton = document.getElementById("checkpointButton");
      const speedSelect = document.getElementById("speedSelect");
      const sortSelect = document.getElementById("sortSelect");
      const viewModeSelect = document.getElementById("viewModeSelect");
      const gridSizeSelect = document.getElementById("gridSizeSelect");
      const overlayLimitSelect = document.getElementById("overlayLimitSelect");
      const trailLengthSelect = document.getElementById("trailLengthSelect");
      const overlayOpacitySelect = document.getElementById(
        "overlayOpacitySelect",
      );
      const overlayLabelSelect = document.getElementById("overlayLabelSelect");
      const prevBatchButton = document.getElementById("prevBatchButton");
      const nextBatchButton = document.getElementById("nextBatchButton");
      const statusLine = document.getElementById("statusLine");
      const buttonList = document.getElementById("buttonList");
      const aiIntentLine = document.getElementById("aiIntentLine");
      const aiObservationGrid = document.getElementById("aiObservationGrid");
      const aiEventList = document.getElementById("aiEventList");
      const findingsList = document.getElementById("findingsList");
      const coverageList = document.getElementById("coverageList");
      const gridSummary = document.getElementById("gridSummary");

      let run;
      let romData;
      let startState;
      let nes;
      let currentSession;
      let currentEntry;
      let sortedSessions = [];
      let episodeRecords = [];
      let currentFrame = 0;
      let playing = false;
      let activeButtons = new Set();
      let replayInputs = [];
      let gridPlayers = [];
      let gridOffset = 0;
      let previousAiSnapshot;
      let activeVisualPopups = [];
      let visualPopupSequence = 0;
      let playbackTimerId;
      let lastTimestamp = 0;
      let frameAccumulator = 0;

      initialize().catch((error) => {
        setStatus(error.message || String(error), "bad");
      });

      async function initialize() {
        const [runResponse, stateResponse, romResponse, episodesResponse] =
          await Promise.all([
            fetch("/api/run"),
            fetch("/api/state"),
            fetch("/api/rom"),
            fetch("/api/episodes"),
          ]);

        if (!runResponse.ok || !stateResponse.ok || !romResponse.ok) {
          throw new Error(
            "Viewer could not load one or more local run assets.",
          );
        }

        run = await runResponse.json();
        startState = await stateResponse.json();
        romData = new Uint8Array(await romResponse.arrayBuffer());
        episodeRecords = await loadEpisodeRecords(episodesResponse);
        if (episodeRecords.length === 0) {
          episodeRecords = (run.sessions || []).map((session, index) => ({
            episode: session.agent?.episode ?? index + 1,
            session,
            overlaySamples: [],
          }));
        }

        const coverageGoal = run.discovery?.coverageGoal;
        const coverageSummary = coverageGoal
          ? ` · coverage ${coverageGoal.percent}% (${coverageGoal.covered}/${coverageGoal.required})${coverageGoal.complete ? "" : ` · missing ${coverageGoal.missing.slice(0, 4).join(", ")}`}`
          : "";
        const discovery = run.discovery
          ? ` · ${run.discovery.strategy || "discovery"} · ${run.discovery.focus || "balanced"} · ${run.discovery.bugTarget || "all"} · ${run.discovery.episodes} episodes · ${run.discovery.uniqueCells} cells · best progress ${run.discovery.bestProgress || 0}/${run.discovery.targetProgress || "-"}${coverageSummary}`
          : "";
        document.getElementById("runSummary").textContent =
          `${run.run.id} · ${run.run.objective} · ${run.run.durationSeconds}s · seed ${run.run.seed}${discovery}`;

        const hasEpisodeSidecar =
          Boolean(run.discovery?.episodeLog) ||
          episodeRecords.length > (run.sessions || []).length;
        if (hasEpisodeSidecar) {
          sortSelect.value =
            run.discovery?.focus === "coverage"
              ? "coverage"
              : run.discovery?.strategy === "full-run-evolution"
                ? "fastest"
                : "progress";
          viewModeSelect.value = "grid";
        } else {
          viewModeSelect.value = "single";
        }
        if (hasEpisodeSidecar) {
          viewModeSelect.value = "overlay";
        }

        personaSelect.addEventListener("change", () =>
          selectSession(Number(personaSelect.value), { reset: true }),
        );
        viewModeSelect.addEventListener("change", () => {
          stopPlayback();
          renderMode();
          resetPlayback(0);
          updateGridSummary();
        });
        sortSelect.addEventListener("change", () => {
          gridOffset = 0;
          renderSessionOptions(currentSession);
          resetPlayback(0);
        });
        gridSizeSelect.addEventListener("change", () => {
          gridOffset = 0;
          resetPlayback(0);
        });
        overlayLimitSelect.addEventListener("change", () => {
          drawGhostOverlay();
          updateGridSummary();
        });
        trailLengthSelect.addEventListener("change", drawGhostOverlay);
        overlayOpacitySelect.addEventListener("change", drawGhostOverlay);
        overlayLabelSelect.addEventListener("change", drawGhostOverlay);
        prevBatchButton.addEventListener("click", () => {
          gridOffset = Math.max(0, gridOffset - gridSize());
          resetPlayback(0);
        });
        nextBatchButton.addEventListener("click", () => {
          gridOffset = Math.min(maxGridOffset(), gridOffset + gridSize());
          resetPlayback(0);
        });
        playPauseButton.addEventListener("click", togglePlayback);
        resetButton.addEventListener("click", () => resetPlayback(0));
        checkpointButton.addEventListener("click", () =>
          resetPlayback(currentSession?.agent?.prefixFrames || 0),
        );
        speedSelect.addEventListener("change", () => {
          frameAccumulator = 0;
          lastTimestamp = performance.now();
        });

        renderButtons([]);
        renderSessionOptions();
        renderMode();
        selectSession(Number(personaSelect.value || 0), { reset: true });
        updateGridSummary();
        setStatus("Ready.", "good");
      }

      async function loadEpisodeRecords(response) {
        if (!response || response.status === 204) {
          return [];
        }
        if (!response.ok) {
          throw new Error("Viewer could not load the episode sidecar.");
        }

        const text = await response.text();
        return text
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => JSON.parse(line))
          .filter((record) => record && record.session);
      }

      function renderSessionOptions(preferredSession) {
        const sessions = episodeRecords.map((record, index) => ({
          session: record.session,
          record,
          index,
        }));
        sortedSessions = sortSessions(sessions, sortSelect.value);
        personaSelect.replaceChildren(
          ...sortedSessions.map((entry, displayIndex) => {
            const option = document.createElement("option");
            option.value = `${displayIndex}`;
            option.textContent = sessionLabel(entry, entry.index);
            return option;
          }),
        );

        const preferredIndex = preferredSession
          ? sortedSessions.findIndex(
              (entry) => entry.session === preferredSession,
            )
          : 0;
        personaSelect.value = `${Math.max(0, preferredIndex)}`;
        updateBatchButtons();
      }

      function sortSessions(sessions, mode) {
        const copy = [...sessions];
        if (mode === "score") {
          return copy.sort((a, b) => displayScore(b) - displayScore(a));
        }
        if (mode === "progress") {
          return copy.sort((a, b) => displayProgress(b) - displayProgress(a));
        }
        if (mode === "fastest") {
          return copy.sort((a, b) => {
            const aBest = fastestMilestoneFrame(a.session);
            const bBest = fastestMilestoneFrame(b.session);
            return (
              displayProgress(b) - displayProgress(a) ||
              aBest - bBest ||
              (b.session.agent?.speedScore || 0) -
                (a.session.agent?.speedScore || 0)
            );
          });
        }
        if (mode === "game-score") {
          return copy.sort(
            (a, b) =>
              (b.session.agent?.gameScoreDelta || 0) -
              (a.session.agent?.gameScoreDelta || 0),
          );
        }
        if (mode === "rooms") {
          return copy.sort(
            (a, b) =>
              (b.session.agent?.roomTransitions || 0) -
              (a.session.agent?.roomTransitions || 0),
          );
        }
        if (mode === "coverage") {
          return copy.sort((a, b) => {
            const bGoals = new Set(b.session.agent?.coverageGoalsHit || [])
              .size;
            const aGoals = new Set(a.session.agent?.coverageGoalsHit || [])
              .size;
            return (
              bGoals - aGoals ||
              (b.session.agent?.coverageScore || 0) -
                (a.session.agent?.coverageScore || 0) ||
              displayProgress(b) - displayProgress(a)
            );
          });
        }
        if (mode === "findings") {
          return copy.sort(
            (a, b) =>
              (b.session.findings?.length || 0) -
              (a.session.findings?.length || 0),
          );
        }
        if (mode === "novelty") {
          return copy.sort(
            (a, b) =>
              (b.session.agent?.newCells || 0) -
              (a.session.agent?.newCells || 0),
          );
        }
        return copy;
      }

      function sessionLabel(entryOrSession, index) {
        const session = entryOrSession.session || entryOrSession;
        if (session.agent) {
          const progress = session.agent.progressDelta
            ? ` · progress +${session.agent.progressDelta}`
            : "";
          const bugScore =
            session.agent.bugScore !== undefined
              ? ` · bug ${session.agent.bugScore}`
              : "";
          const coverageScore =
            session.agent.coverageScore !== undefined
              ? ` · cov ${session.agent.coverageScore}`
              : "";
          const gameScore =
            session.agent.gameScoreDelta !== undefined
              ? ` · game +${session.agent.gameScoreDelta}`
              : "";
          const adjusted = displayScore(entryOrSession);
          const rawScore = Number(session.agent.score ?? 0);
          const scoreLabel =
            session.metrics?.deaths > 0 &&
            Math.round(adjusted) !== Math.round(rawScore)
              ? `score ${Math.round(adjusted)} raw ${rawScore}`
              : `score ${rawScore}`;
          return `#${session.agent.episode} ${session.persona} · ${scoreLabel}${bugScore}${coverageScore}${gameScore} · bugs ${session.findings?.length || 0} · new ${session.agent.newCells}${progress}`;
        }

        return `${index + 1}. ${session.persona} (${session.status})`;
      }

      function selectSession(displayIndex, options = { reset: false }) {
        currentEntry = sortedSessions[displayIndex];
        currentSession = currentEntry?.session;
        previousAiSnapshot = undefined;
        clearVisualPopups();
        if (!currentSession) {
          setStatus("No session found in this run.", "bad");
          return;
        }

        personaSelect.value = `${displayIndex}`;
        replayInputs = Array.isArray(currentSession.replayInputs)
          ? currentSession.replayInputs
          : [];
        renderSessionSummary();
        updateGridSelection();
        updateGridSummary();
        if (options.reset) {
          resetPlayback(0);
        } else {
          renderButtons(buttonsForFrame(replayInputs, currentFrame));
          updateTelemetry();
        }
      }

      function renderMode() {
        const gridMode = isGridMode();
        const overlayMode = isOverlayMode();
        singleViewer.classList.toggle("hidden", gridMode);
        overlayLegendPanel.classList.toggle("hidden", !overlayMode);
        gridPanel.classList.toggle("hidden", !gridMode);
        gridControls.classList.toggle("hidden", !gridMode);
        overlayControls.classList.toggle("hidden", !overlayMode);
        ghostOverlay.classList.add("hidden");
        if (!overlayMode) {
          clearGhostOverlay();
        }
        if (gridMode) {
          clearVisualPopups();
        }
        checkpointButton.textContent = gridMode
          ? "Jump grid to checkpoint"
          : "Jump to checkpoint";
      }

      function createNes(onFrame) {
        const emulator = new jsnes.NES({
          emulateSound: false,
          onFrame,
        });
        emulator.loadROM(romData);
        emulator.fromJSON(JSON.parse(JSON.stringify(startState)));
        return emulator;
      }

      function resetPlayback(frame) {
        if (isGridMode()) {
          resetGridPlayback(frame);
        } else {
          resetSinglePlayback(frame);
        }
      }

      function resetSinglePlayback(frame) {
        stopPlayback();
        previousAiSnapshot = undefined;
        clearVisualPopups();
        nes = createNes(singleRenderer.renderFrame);
        currentFrame = 0;
        activeButtons = new Set();
        renderButtons([]);

        const targetFrame = Math.max(
          0,
          Math.min(
            frame,
            currentSession?.metrics?.frames || maxReplayFrame(replayInputs),
          ),
        );
        for (let index = 0; index < targetFrame; index += 1) {
          stepSingleFrame(false);
        }

        renderButtons(buttonsForFrame(replayInputs, currentFrame));
        updateTelemetry();
        drawGhostOverlay();
        const canReplay = replayInputs.length > 0;
        playPauseButton.disabled = !canReplay;
        resetButton.disabled = false;
        checkpointButton.disabled =
          !canReplay || !(currentSession?.agent?.prefixFrames > 0);
        setStatus(
          canReplay
            ? "Ready to replay full persona run."
            : "This run has no full replayInputs. Re-run agents to enable full playback.",
          canReplay ? "good" : "warn",
        );
      }

      function resetGridPlayback(frame) {
        stopPlayback();
        previousAiSnapshot = undefined;
        clearVisualPopups();
        nes = undefined;
        activeButtons = new Set();
        currentFrame = 0;
        renderGridTiles();

        const maxFrame = maxVisibleGridFrame();
        const targetFrame = Math.max(0, Math.min(frame, maxFrame));
        for (let index = 0; index < targetFrame; index += 1) {
          stepGridFrame(false);
        }

        renderButtons(buttonsForFrame(replayInputs, currentFrame));
        updateTelemetry();
        updateGridTileStates();
        updateBatchButtons();
        const canReplay = gridPlayers.some(
          (player) => player.replayInputs.length > 0,
        );
        playPauseButton.disabled = !canReplay;
        resetButton.disabled = false;
        checkpointButton.disabled =
          !canReplay || !(currentSession?.agent?.prefixFrames > 0);
        setStatus(
          canReplay
            ? "Ready to replay synced grid."
            : "No visible grid episodes have full replayInputs.",
          canReplay ? "good" : "warn",
        );
      }

      function renderGridTiles() {
        gridPlayers = [];
        gridViewer.replaceChildren();

        const visibleEntries = sortedSessions.slice(
          gridOffset,
          gridOffset + gridSize(),
        );
        if (!visibleEntries.length) {
          const placeholder = document.createElement("div");
          placeholder.className = "grid-placeholder";
          placeholder.textContent = "No episodes available.";
          gridViewer.appendChild(placeholder);
          return;
        }

        for (const [visibleIndex, entry] of visibleEntries.entries()) {
          const displayIndex = gridOffset + visibleIndex;
          const tile = document.createElement("section");
          tile.className = "grid-tile";
          tile.tabIndex = 0;

          const header = document.createElement("div");
          header.className = "grid-tile-header";

          const title = document.createElement("div");
          title.className = "grid-title";
          title.textContent = shortGridLabel(entry, entry.index);

          const meta = document.createElement("div");
          meta.className = "grid-meta";
          meta.textContent = gridMeta(entry);

          const state = document.createElement("div");
          state.className = "grid-meta";
          state.textContent = "frame 0 · progress 0";

          header.append(title, meta, state);

          const tileCanvas = document.createElement("canvas");
          tileCanvas.className = "grid-screen";
          tileCanvas.width = 256;
          tileCanvas.height = 240;
          tile.append(header, tileCanvas);
          gridViewer.appendChild(tile);

          tile.addEventListener("click", () =>
            selectSession(displayIndex, { reset: false }),
          );
          tile.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectSession(displayIndex, { reset: false });
            }
          });

          const renderer = createCanvasRenderer(tileCanvas, 2);
          const playerReplayInputs = Array.isArray(entry.session.replayInputs)
            ? entry.session.replayInputs
            : [];
          const player = {
            activeButtons: new Set(),
            displayIndex,
            entry,
            frame: 0,
            meta,
            nes: playerReplayInputs.length
              ? createNes(renderer.renderFrame)
              : undefined,
            replayInputs: playerReplayInputs,
            renderer,
            session: entry.session,
            state,
            tile,
            totalFrames:
              entry.session.metrics?.frames ||
              maxReplayFrame(playerReplayInputs),
          };
          if (!playerReplayInputs.length) {
            state.textContent = "full replay unavailable";
          }
          gridPlayers.push(player);
        }
        updateGridSelection();
      }

      function togglePlayback() {
        if (playing) {
          stopPlayback();
          return;
        }

        playing = true;
        playPauseButton.textContent = "Pause";
        lastTimestamp = performance.now();
        frameAccumulator = 0;
        schedulePlaybackLoop(0);
      }

      function stopPlayback() {
        playing = false;
        playPauseButton.textContent = "Play";
        if (playbackTimerId) {
          clearTimeout(playbackTimerId);
          playbackTimerId = undefined;
        }
      }

      function schedulePlaybackLoop(delay) {
        if (!playing) {
          return;
        }
        playbackTimerId = window.setTimeout(
          () => playbackLoop(performance.now()),
          delay,
        );
      }

      function playbackLoop(timestamp) {
        if (!playing) {
          return;
        }

        const speed = Number(speedSelect.value);
        const elapsed = timestamp - lastTimestamp;
        lastTimestamp = timestamp;
        frameAccumulator += (elapsed / 1000) * 60 * speed;

        while (frameAccumulator >= 1) {
          const advanced = isGridMode()
            ? stepGridFrame(true)
            : stepSingleFrame(true);
          if (!advanced) {
            stopPlayback();
            setStatus("Replay complete.", "good");
            return;
          }
          frameAccumulator -= 1;
        }

        updateTelemetry();
        schedulePlaybackLoop(16);
      }

      function stepSingleFrame(render) {
        if (
          !nes ||
          currentFrame >=
            (currentSession?.metrics?.frames || maxReplayFrame(replayInputs))
        ) {
          return false;
        }

        currentFrame += 1;
        const buttons = buttonsForFrame(replayInputs, currentFrame);
        activeButtons = applyButtonsTo(nes, activeButtons, buttons);
        nes.frame();
        if (render) {
          renderButtons(buttons);
          drawGhostOverlay();
        }
        return true;
      }

      function stepGridFrame(render) {
        const maxFrame = maxVisibleGridFrame();
        if (!gridPlayers.length || currentFrame >= maxFrame) {
          return false;
        }

        currentFrame += 1;
        for (const player of gridPlayers) {
          if (!player.nes || currentFrame > player.totalFrames) {
            continue;
          }
          const buttons = buttonsForFrame(player.replayInputs, currentFrame);
          player.activeButtons = applyButtonsTo(
            player.nes,
            player.activeButtons,
            buttons,
          );
          player.nes.frame();
          player.frame = currentFrame;
        }
        if (render) {
          renderButtons(buttonsForFrame(replayInputs, currentFrame));
          updateGridTileStates();
        }
        return true;
      }

      function applyButtonsTo(emulator, currentButtons, buttons) {
        const nextButtons = new Set(buttons);
        for (const button of currentButtons) {
          if (!nextButtons.has(button)) {
            emulator.buttonUp(1, BUTTON_MAP[button]);
          }
        }
        for (const button of nextButtons) {
          if (!currentButtons.has(button)) {
            emulator.buttonDown(1, BUTTON_MAP[button]);
          }
        }
        return nextButtons;
      }

      function buttonsForFrame(ranges, frame) {
        const range = ranges.find(
          (candidate) =>
            candidate.frameStart <= frame && candidate.frameEnd >= frame,
        );
        return range
          ? range.buttons.filter((button) => BUTTONS.includes(button))
          : [];
      }

      function createCanvasRenderer(targetCanvas, renderEvery = 1) {
        const context = targetCanvas.getContext("2d");
        const imageData = context.createImageData(256, 240);
        let frameCounter = 0;
        context.fillStyle = "#030405";
        context.fillRect(0, 0, 256, 240);

        return {
          context,
          imageData,
          renderFrame(buffer) {
            frameCounter += 1;
            if (renderEvery > 1 && frameCounter % renderEvery !== 0) {
              return;
            }
            for (let i = 0; i < buffer.length; i += 1) {
              const pixel = buffer[i];
              const offset = i * 4;
              imageData.data[offset] = (pixel >> 16) & 0xff;
              imageData.data[offset + 1] = (pixel >> 8) & 0xff;
              imageData.data[offset + 2] = pixel & 0xff;
              imageData.data[offset + 3] = 0xff;
            }
            context.putImageData(imageData, 0, 0);
          },
          redrawFrame() {
            context.putImageData(imageData, 0, 0);
          },
        };
      }

      function renderAiMoment(snapshot, buttons) {
        const inputRange = currentInputRange(
          currentSession?.replayInputs || [],
          currentFrame,
        );
        aiIntentLine.textContent = describeAiIntent(
          snapshot,
          buttons,
          inputRange,
        );
        aiObservationGrid.replaceChildren(
          aiCell(
            "State",
            `${snapshot.playerStateName || "unknown"} · ${snapshot.dying ? "dying" : "alive"}`,
          ),
          aiCell(
            "Position",
            `w${snapshot.world}-${snapshot.level} · screen ${snapshot.currentScreen} · x ${snapshot.xOnScreen} y ${snapshot.yOnScreen}`,
          ),
          aiCell(
            "Camera",
            `left ${cameraOriginForSnapshot(snapshot)} · fine ${snapshot.screenLeftX ?? 0}`,
          ),
          aiCell(
            "Progress",
            `${snapshot.progress} / best ${currentSession?.metrics?.maxProgress ?? "-"}`,
          ),
          aiCell(
            "Room",
            snapshot.roomId || `area ${snapshot.areaOffset ?? "-"}`,
          ),
          aiCell(
            "Score",
            `${snapshot.score ?? 0} · coins ${snapshot.coins ?? 0}`,
          ),
          aiCell("Enemies", enemySummary(snapshot)),
          aiCell(
            "Timer/Lives",
            `${snapshot.gameTimer ?? "-"} · lives ${snapshot.lives ?? "-"}`,
          ),
          aiCell(
            "Motion",
            `vx ${snapshot.horizontalSpeed ?? 0} · |vx| ${snapshot.horizontalSpeedAbs ?? 0} · vy ${snapshot.verticalVelocity ?? 0}`,
          ),
          aiCell(
            "Collision",
            `player ${hexByte(snapshot.playerCollisionBits)} · enemy ${hexByte(snapshot.enemyCollisionBits)} · hit ${hexByte(snapshot.playerHitDetectFlag)}`,
          ),
          aiCell(
            "Flow",
            `mode ${snapshot.gameMode ?? "-"} · loading ${snapshot.levelLoading ?? "-"} · change ${snapshot.changeAreaTimer ?? 0}`,
          ),
          aiCell("Signals", specialSignalSummary(snapshot)),
        );

        const events = aiMomentEvents(snapshot, buttons, inputRange);
        aiEventList.replaceChildren(...events.map((event) => aiEvent(event)));
        renderVisualPopups(events);
        previousAiSnapshot = cloneAiSnapshot(snapshot);
      }

      function aiCell(label, value) {
        const node = document.createElement("div");
        node.className = "ai-cell";
        const labelNode = document.createElement("span");
        labelNode.textContent = label;
        const valueNode = document.createElement("strong");
        valueNode.textContent = value;
        node.append(labelNode, valueNode);
        return node;
      }

      function aiEvent(event) {
        const node = document.createElement("div");
        node.className = `ai-event ${event.tone || ""}`.trim();
        const label = document.createElement("span");
        label.textContent = event.label;
        const body = document.createElement("div");
        body.textContent = event.body;
        node.append(label, body);
        return node;
      }

      function describeAiIntent(snapshot, buttons, inputRange) {
        const action = describeButtons(buttons, snapshot);
        const range = inputRange
          ? `frames ${inputRange.frameStart}-${inputRange.frameEnd}`
          : `frame ${currentFrame}`;
        const agent = currentSession?.agent;
        const mode =
          agent?.phase || agent?.type || currentSession?.persona || "replay";
        if (snapshot.dying) {
          return `${range}: terminal death state. ${mode} should stop scoring and stop exploring from this point.`;
        }
        return `${range}: ${action}. ${mode}${agent?.mutation ? ` · ${agent.mutation}` : ""}`;
      }

      function describeButtons(buttons, snapshot) {
        const set = new Set(buttons);
        if (!buttons.length) {
          return snapshot.levelLoading
            ? "waiting through level transition/loading"
            : "idle/observe";
        }
        const parts = [];
        if (set.has("RIGHT") && set.has("B")) parts.push("speed-run right");
        else if (set.has("RIGHT")) parts.push("move right");
        if (set.has("LEFT")) parts.push("left correction/backtrack");
        if (set.has("A")) parts.push("jump");
        if (set.has("DOWN"))
          parts.push(
            snapshot.pipeInteraction
              ? "pipe-entry/down probe"
              : "crouch/down probe",
          );
        if (set.has("UP"))
          parts.push(
            snapshot.vineVisible || snapshot.onVine ? "vine climb" : "up probe",
          );
        return parts.length ? parts.join(" + ") : buttons.join("+");
      }

      function aiMomentEvents(snapshot, buttons, inputRange) {
        const events = [];
        const activeGameplay =
          snapshot.gameMode === 1 &&
          snapshot.levelLoading === 0 &&
          snapshot.playerStateName !== "left-edge";
        const previous = previousAiSnapshot;
        if (previous && currentFrame > 0) {
          const scoreDelta = (snapshot.score ?? 0) - (previous.score ?? 0);
          if (scoreDelta > 0) {
            events.push({
              label: "Score increased",
              body: `SMB score +${scoreDelta} (${previous.score ?? 0} -> ${snapshot.score ?? 0}).`,
              tone: "good",
              popup: true,
            });
          }
          const coinDelta = (snapshot.coins ?? 0) - (previous.coins ?? 0);
          if (coinDelta > 0) {
            events.push({
              label: "Coin collected",
              body: `Coins +${coinDelta} (${previous.coins ?? 0} -> ${snapshot.coins ?? 0}).`,
              tone: "good",
              popup: true,
            });
          }
          const progressDelta =
            (snapshot.progress ?? 0) - (previous.progress ?? 0);
          if (activeGameplay && progressDelta >= 32) {
            events.push({
              label: "Fast progress",
              body: `Progress jumped +${progressDelta} since the previous rendered moment.`,
              tone: "good",
              popup: true,
              popupKey: "Fast progress",
            });
          } else if (activeGameplay && progressDelta <= -32) {
            events.push({
              label: "Backtrack/transition",
              body: `Progress changed ${progressDelta}, usually a room transition or backward movement.`,
              tone: "warning",
              popup: true,
            });
          }
          if ((snapshot.lives ?? 0) < (previous.lives ?? 0)) {
            events.push({
              label: "Life lost",
              body: `Lives changed ${previous.lives} -> ${snapshot.lives}.`,
              tone: "bad",
              popup: true,
            });
          }
          if ((snapshot.gameTimer ?? 0) < (previous.gameTimer ?? 0) - 1) {
            events.push({
              label: "Timer tick",
              body: `Timer changed ${previous.gameTimer} -> ${snapshot.gameTimer}.`,
            });
          }
          if (
            snapshot.roomId &&
            previous.roomId &&
            snapshot.roomId !== previous.roomId
          ) {
            events.push({
              label: "Room changed",
              body: `${previous.roomId} -> ${snapshot.roomId}.`,
              tone: "good",
              popup: true,
            });
          }

          const previousEnemies = enemyTypeSet(previous);
          const currentEnemies = enemyTypeSet(snapshot);
          const appeared = [...currentEnemies].filter(
            (enemy) => !previousEnemies.has(enemy),
          );
          const disappeared = [...previousEnemies].filter(
            (enemy) => !currentEnemies.has(enemy),
          );
          if (appeared.length) {
            events.push({
              label: "Enemy spotted",
              body: `New enemy/object type(s): ${appeared.map(enemyName).join(", ")}.`,
              tone: "warning",
              popup: true,
            });
          }
          if (disappeared.length) {
            events.push({
              label: "Enemy cleared/despawned",
              body: `No longer visible: ${disappeared.map(enemyName).join(", ")}.`,
              tone: "good",
              popup: true,
            });
          }
        }

        if (enemyTypeSet(snapshot).size > 0) {
          events.push({
            label: "Enemy/object visible",
            body: enemySummary(snapshot),
            tone: "warning",
          });
        }
        const activeFindings = (currentSession?.findings || []).filter(
          (finding) =>
            finding.frameStart <= currentFrame &&
            finding.frameEnd >= currentFrame,
        );
        for (const finding of activeFindings) {
          events.push({
            label: `${finding.severity.toUpperCase()} finding active`,
            body: `${finding.type}: ${finding.summary}`,
            tone:
              finding.severity === "high"
                ? "bad"
                : finding.severity === "medium"
                  ? "warning"
                  : "",
            popup: true,
            popupKey: `finding-${finding.type}-${finding.frameStart}`,
          });
        }

        const milestones = Object.entries(
          currentSession?.agent?.milestoneFrames || {},
        ).filter(([, frame]) => Math.abs(frame - currentFrame) <= 2);
        for (const [name, frame] of milestones) {
          events.push({
            label: "Milestone",
            body: `${name} reached at frame ${frame}.`,
            tone: "good",
            popup: true,
            popupKey: `milestone-${name}`,
          });
        }

        if (
          currentSession?.agent?.prefixFrames !== undefined &&
          Math.abs(currentFrame - currentSession.agent.prefixFrames) <= 1
        ) {
          events.push({
            label: "Checkpoint boundary",
            body: `Replay prefix ends here; this episode's explored suffix starts at frame ${currentSession.agent.prefixFrames}.`,
            tone: "good",
            popup: true,
          });
        }

        const obstacleFrame = currentSession?.agent?.obstacleFrame;
        const obstacleEnd =
          obstacleFrame === undefined
            ? undefined
            : obstacleFrame +
              (currentSession.agent?.obstacleDurationFrames || 60);
        if (
          obstacleFrame !== undefined &&
          currentFrame >= obstacleFrame &&
          currentFrame <= obstacleEnd
        ) {
          events.push({
            label: "Obstacle window",
            body: `${currentSession.agent?.obstacleReason || "forward progress blocked"} near progress ${currentSession.agent?.obstacleProgress ?? snapshot.progress}.`,
            tone: "warning",
            popup: true,
            popupKey: "obstacle-window",
          });
        }

        if (snapshot.dying) {
          events.push({
            label: "Death",
            body: "RAM indicates Mario is dying or death music is active.",
            tone: "bad",
            popup: true,
          });
        }
        if (!activeGameplay) {
          events.push({
            label: "Loading/transition",
            body: `Game is not in active controllable play. mode=${snapshot.gameMode}, loading=${snapshot.levelLoading}, state=${snapshot.playerStateName}.`,
          });
        }
        if (snapshot.enteringPipe || snapshot.changeAreaTimer > 0) {
          events.push({
            label: "Transition/pipe",
            body: `Pipe or area transition signal active. changeAreaTimer=${snapshot.changeAreaTimer}.`,
            tone: "good",
            popup:
              !previous ||
              !previous.enteringPipe ||
              previous.changeAreaTimer === 0,
          });
        } else if (snapshot.pipeInteraction) {
          events.push({
            label: "Pipe geometry",
            body: `${snapshot.pipeTileCount} pipe tiles visible/nearby.`,
            tone: "warning",
            popup: Boolean(previous && !previous.pipeInteraction),
          });
        }
        if (snapshot.vineVisible || snapshot.onVine) {
          events.push({
            label: "Vine signal",
            body: `Vine visible/on-vine signal active. vineTiles=${snapshot.vineTileCount}.`,
            tone: "good",
            popup: Boolean(
              !previous || (!previous.vineVisible && !previous.onVine),
            ),
          });
        }
        if (snapshot.warpZoneVisible) {
          events.push({
            label: "Warp signal",
            body: `Warp-zone indicator active. warpZoneControl=${snapshot.warpZoneControl}.`,
            tone: "good",
            popup: Boolean(!previous || !previous.warpZoneVisible),
          });
        }
        if (snapshot.hiddenBlockTileCount > 0) {
          events.push({
            label: "Hidden block signal",
            body: `${snapshot.hiddenBlockTileCount} hidden block tile markers detected in tile RAM.`,
            tone: "good",
            popup: Boolean(!previous || previous.hiddenBlockTileCount <= 0),
          });
        }
        if (
          activeGameplay &&
          (snapshot.scrollLock > 0 ||
            snapshot.playerCollisionBits !== 0xff ||
            snapshot.playerHitDetectFlag !== 0)
        ) {
          events.push({
            label: "Collision/scroll pressure",
            body: `scrollLock=${snapshot.scrollLock}, collision=${hexByte(snapshot.playerCollisionBits)}, hit=${hexByte(snapshot.playerHitDetectFlag)}.`,
            tone: "warning",
            popup: Boolean(
              previous &&
              previous.scrollLock === 0 &&
              previous.playerCollisionBits === 0xff &&
              previous.playerHitDetectFlag === 0,
            ),
          });
        }
        if (inputRange) {
          events.push({
            label: "Input window",
            body: `${inputRange.buttons.length ? inputRange.buttons.join("+") : "no buttons"} from frame ${inputRange.frameStart} to ${inputRange.frameEnd}.`,
          });
        }
        if (!events.length) {
          events.push({
            label: "No event",
            body: "No finding, milestone, transition, collision, or special-object signal is active at this frame.",
          });
        }
        return events;
      }

      function currentInputRange(ranges, frame) {
        return ranges.find(
          (candidate) =>
            candidate.frameStart <= frame && candidate.frameEnd >= frame,
        );
      }

      function renderVisualPopups(events) {
        if (!eventPopupLayer) {
          return;
        }
        if (isGridMode()) {
          clearVisualPopups();
          return;
        }

        for (const event of events.filter((candidate) => candidate.popup)) {
          const key = event.popupKey || `${event.label}|${event.body}`;
          const duplicate = activeVisualPopups.find(
            (popup) => popup.key === key && popup.expiresFrame >= currentFrame,
          );
          if (duplicate) {
            duplicate.expiresFrame = Math.max(
              duplicate.expiresFrame,
              currentFrame + 105,
            );
            continue;
          }

          activeVisualPopups.unshift({
            id: (visualPopupSequence += 1),
            key,
            label: event.label,
            body: event.body,
            tone: event.tone || "",
            createdFrame: currentFrame,
            expiresFrame: currentFrame + 150,
          });
        }

        activeVisualPopups = activeVisualPopups
          .filter((popup) => popup.expiresFrame >= currentFrame)
          .slice(0, 5);

        const desiredNodes = activeVisualPopups.map((popup, index) => {
          const node = popupNodeFor(popup);
          updatePopupNode(node, popup, index);
          return node;
        });

        for (const child of [...eventPopupLayer.children]) {
          if (!desiredNodes.includes(child)) {
            child.remove();
          }
        }

        desiredNodes.forEach((node, index) => {
          if (eventPopupLayer.children[index] !== node) {
            eventPopupLayer.insertBefore(
              node,
              eventPopupLayer.children[index] || null,
            );
          }
        });
      }

      function popupNodeFor(popup) {
        const id = String(popup.id);
        const existing = eventPopupLayer.querySelector(
          `[data-popup-id="${id}"]`,
        );
        if (existing) {
          return existing;
        }

        const node = document.createElement("div");
        node.dataset.popupId = id;
        node.className = "event-popup";
        node.append(
          document.createElement("strong"),
          document.createElement("span"),
        );
        return node;
      }

      function updatePopupNode(node, popup, index) {
        node.className = `event-popup ${popup.tone}`.trim();
        node.style.top = `${8 + index * 48}px`;
        const remaining = popup.expiresFrame - currentFrame;
        node.style.opacity = `${Math.max(0.15, Math.min(1, remaining / 24))}`;
        node.querySelector("strong").textContent = popup.label;
        node.querySelector("span").textContent = popup.body;
      }

      function clearVisualPopups() {
        activeVisualPopups = [];
        eventPopupLayer?.replaceChildren();
      }

      function cloneAiSnapshot(snapshot) {
        return {
          score: snapshot.score,
          coins: snapshot.coins,
          progress: snapshot.progress,
          lives: snapshot.lives,
          gameTimer: snapshot.gameTimer,
          roomId: snapshot.roomId,
          enemyTypes: [...(snapshot.enemyTypes || [])],
          enteringPipe: snapshot.enteringPipe,
          changeAreaTimer: snapshot.changeAreaTimer,
          pipeInteraction: snapshot.pipeInteraction,
          vineVisible: snapshot.vineVisible,
          onVine: snapshot.onVine,
          warpZoneVisible: snapshot.warpZoneVisible,
          hiddenBlockTileCount: snapshot.hiddenBlockTileCount,
          scrollLock: snapshot.scrollLock,
          playerCollisionBits: snapshot.playerCollisionBits,
          playerHitDetectFlag: snapshot.playerHitDetectFlag,
        };
      }

      function enemyTypeSet(snapshot) {
        return new Set(
          (snapshot.enemyTypes || []).filter((type) => type !== 0),
        );
      }

      function enemySummary(snapshot) {
        const enemies = [...enemyTypeSet(snapshot)];
        if (!enemies.length) {
          return "none visible";
        }
        return enemies.map(enemyName).join(", ");
      }

      function enemyName(type) {
        const names = {
          0x06: "Goomba",
          0x07: "Koopa",
          0x08: "Koopa",
          0x09: "Buzzy Beetle",
          0x0a: "Bullet Bill",
          0x0b: "Blooper",
          0x0c: "Cheep Cheep",
          0x0d: "Podoboo",
          0x10: "Piranha Plant",
          0x11: "Lakitu",
          0x12: "Spiny",
          0x2d: "lift/platform",
          0x2e: "lift/platform",
          0x2f: "vine",
          0x30: "flagpole",
          0x31: "star flag object",
          0x34: "warp-zone text/object",
        };
        return names[type]
          ? `${names[type]} (${hexByte(type)})`
          : `object ${hexByte(type)}`;
      }

      function specialSignalSummary(snapshot) {
        const signals = [];
        if (snapshot.pipeInteraction) signals.push("pipe");
        if (snapshot.vineVisible || snapshot.onVine) signals.push("vine");
        if (snapshot.warpZoneVisible) signals.push("warp");
        if (snapshot.hiddenBlockTileCount > 0) signals.push("hidden block");
        if (snapshot.scrollLock > 0) signals.push("scroll lock");
        if (snapshot.dying) signals.push("death");
        return signals.length ? signals.join(", ") : "none";
      }

      function renderSessionSummary() {
        const metrics = currentSession.metrics || {};
        document.getElementById("statusMetric").textContent =
          currentSession.status || "-";
        document.getElementById("deathsMetric").textContent =
          metrics.deaths ?? 0;
        document.getElementById("findingsMetric").textContent =
          currentSession.findings?.length ?? 0;

        coverageList.replaceChildren(
          ...(currentSession.coverage || []).map((item) => pill(item)),
        );
        if (!coverageList.children.length) {
          coverageList.appendChild(pill("none"));
        }

        if (currentSession.agent) {
          coverageList.appendChild(pill(`score ${currentSession.agent.score}`));
          const adjustedScore = displayScore(currentEntry || currentSession);
          if (
            currentSession.metrics?.deaths > 0 &&
            Math.round(adjustedScore) !==
              Math.round(Number(currentSession.agent.score ?? 0))
          ) {
            coverageList.appendChild(
              pill(`quality score ${Math.round(adjustedScore)}`),
            );
          }
          if (currentSession.agent.progressScore !== undefined) {
            coverageList.appendChild(
              pill(`progress score ${currentSession.agent.progressScore}`),
            );
          }
          if (currentSession.agent.bugScore !== undefined) {
            coverageList.appendChild(
              pill(`bug score ${currentSession.agent.bugScore}`),
            );
          }
          if (currentSession.agent.coverageScore !== undefined) {
            coverageList.appendChild(
              pill(`coverage score ${currentSession.agent.coverageScore}`),
            );
          }
          if (currentSession.agent.routeScore !== undefined) {
            coverageList.appendChild(
              pill(`route score ${currentSession.agent.routeScore}`),
            );
          }
          if (currentSession.agent.speedScore !== undefined) {
            coverageList.appendChild(
              pill(`speed score ${currentSession.agent.speedScore}`),
            );
          }
          if (currentSession.agent.roomScore !== undefined) {
            coverageList.appendChild(
              pill(`room score ${currentSession.agent.roomScore}`),
            );
          }
          if (currentSession.agent.gameScoreDelta !== undefined) {
            coverageList.appendChild(
              pill(`game +${currentSession.agent.gameScoreDelta}`),
            );
          }
          if (currentSession.agent.roomTransitions !== undefined) {
            coverageList.appendChild(
              pill(`rooms ${currentSession.agent.roomTransitions}`),
            );
          }
          if (currentSession.agent.phase) {
            coverageList.appendChild(
              pill(`phase ${currentSession.agent.phase}`),
            );
          }
          if (currentSession.agent.rlEpsilon !== undefined) {
            coverageList.appendChild(
              pill(`epsilon ${currentSession.agent.rlEpsilon}`),
            );
          }
          if (currentSession.agent.rlStateCount !== undefined) {
            coverageList.appendChild(
              pill(`rl states ${currentSession.agent.rlStateCount}`),
            );
          }
          for (const goal of (
            currentSession.agent.coverageGoalsHit || []
          ).slice(0, 10)) {
            coverageList.appendChild(pill(goal));
          }
          coverageList.appendChild(
            pill(`new cells ${currentSession.agent.newCells}`),
          );
          if (currentSession.agent.focus) {
            coverageList.appendChild(
              pill(`focus ${currentSession.agent.focus}`),
            );
          }
          if (currentSession.agent.bugTarget) {
            coverageList.appendChild(
              pill(`target ${currentSession.agent.bugTarget}`),
            );
          }
          if (currentSession.agent.type) {
            coverageList.appendChild(pill(currentSession.agent.type));
          }
          if (currentSession.agent.prefixFrames !== undefined) {
            coverageList.appendChild(
              pill(`prefix ${currentSession.agent.prefixFrames}f`),
            );
          }
          if (currentSession.agent.suffixFrames !== undefined) {
            coverageList.appendChild(
              pill(`suffix ${currentSession.agent.suffixFrames}f`),
            );
          }
          if (currentSession.agent.progressDelta !== undefined) {
            coverageList.appendChild(
              pill(`progress +${currentSession.agent.progressDelta}`),
            );
          }
          if (currentSession.agent.targetReached !== undefined) {
            coverageList.appendChild(
              pill(
                currentSession.agent.targetReached
                  ? "target reached"
                  : "target pending",
              ),
            );
          }
          if (currentSession.agent.obstacleFrame !== undefined) {
            coverageList.appendChild(
              pill(
                `obstacle ${currentSession.agent.obstacleProgress ?? "-"} @ ${currentSession.agent.obstacleFrame}f`,
              ),
            );
          }
          if (currentSession.agent.startCell) {
            coverageList.appendChild(
              pill(`start ${currentSession.agent.startCell.slice(0, 28)}`),
            );
          }
          coverageList.appendChild(pill(currentSession.agent.mutation));
        }

        findingsList.replaceChildren();
        for (const finding of currentSession.findings || []) {
          findingsList.appendChild(renderFinding(finding));
        }
        if (!findingsList.children.length) {
          const p = document.createElement("p");
          p.textContent = "No findings for this persona.";
          findingsList.appendChild(p);
        }
      }

      function renderFinding(finding) {
        const section = document.createElement("section");
        section.className = "finding";

        const title = document.createElement("div");
        title.className = "finding-title";

        const strong = document.createElement("strong");
        strong.textContent = finding.type;
        title.appendChild(strong);

        const severity = document.createElement("span");
        severity.className = `severity ${finding.severity}`;
        severity.textContent = finding.severity;
        title.appendChild(severity);

        const summary = document.createElement("p");
        summary.textContent = finding.summary;

        const details = document.createElement("p");
        details.innerHTML = `Frames <code>${finding.frameStart}</code> to <code>${finding.frameEnd}</code>`;

        const repro = document.createElement("p");
        repro.textContent = formatReproInputs(finding.reproInputs || []);

        const button = document.createElement("button");
        button.textContent = "Jump to finding";
        button.disabled = replayInputs.length === 0;
        button.addEventListener("click", () =>
          resetPlayback(Math.max(0, finding.frameStart - 1)),
        );

        section.append(title, summary, details, repro, button);
        return section;
      }

      function formatReproInputs(ranges) {
        if (!ranges.length) {
          return "No repro input window stored for this finding.";
        }
        return ranges
          .slice(0, 4)
          .map((range) => {
            const buttons = range.buttons.length
              ? range.buttons.join("+")
              : "none";
            return `${range.frameStart}-${range.frameEnd}: ${buttons}`;
          })
          .join(" · ");
      }

      function renderButtons(buttons) {
        buttonList.replaceChildren(
          ...BUTTONS.map((button) => {
            const span = document.createElement("span");
            span.className = buttons.includes(button)
              ? "controller-button active"
              : "controller-button";
            span.textContent = button;
            return span;
          }),
        );
      }

      function updateTelemetry() {
        const snapshot = isGridMode()
          ? readSnapshot(selectedGridPlayer()?.nes)
          : readSnapshot(nes);
        const buttons = buttonsForFrame(replayInputs, currentFrame);
        document.getElementById("frameMetric").textContent = `${currentFrame}`;
        document.getElementById("timeMetric").textContent =
          `${(currentFrame / 60).toFixed(2)}s`;
        document.getElementById("progressMetric").textContent =
          `${snapshot.progress}`;
        renderAiMoment(snapshot, buttons);
      }

      function updateGridTileStates() {
        for (const player of gridPlayers) {
          const snapshot = readSnapshot(player.nes);
          const done =
            player.replayInputs.length > 0 &&
            currentFrame >= player.totalFrames;
          player.state.textContent = done
            ? `complete · ${player.totalFrames}f · progress ${snapshot.progress}`
            : `frame ${Math.min(currentFrame, player.totalFrames)} · progress ${snapshot.progress}`;
        }
        updateGridSelection();
        updateTelemetry();
      }

      function updateGridSelection() {
        for (const player of gridPlayers) {
          player.tile.classList.toggle(
            "selected",
            player.session === currentSession,
          );
        }
      }

      function drawGhostOverlay() {
        ghostContext.clearRect(0, 0, ghostOverlay.width, ghostOverlay.height);
        ghostOverlay.dataset.ghosts = "0";
        if (!isOverlayMode() || !episodeRecords.length) {
          renderOverlayLegend([], 0);
          return;
        }

        singleRenderer.redrawFrame();
        ghostDrawContext = singleRenderer.context;
        const base = readSnapshot(nes);
        const baseFrame = Math.max(1, currentFrame);
        const cameraOrigin = cameraOriginForSnapshot(base);
        const entries = overlayEntries();
        const labelMode = overlayLabelSelect.value || "first25";
        const legendItems = [];
        let ghostsDrawn = 0;

        ghostDrawContext.save();
        ghostDrawContext.lineCap = "round";
        ghostDrawContext.lineJoin = "round";
        for (const [overlayIndex, entry] of entries.entries()) {
          const samples = visibleOverlaySamples(
            entry.record?.overlaySamples,
            baseFrame,
          );
          if (!samples.length) {
            continue;
          }

          const color = colorForEpisode(
            entry.record?.episode ?? entry.index ?? overlayIndex,
          );
          const opacity = Number(overlayOpacitySelect.value) || 0.65;
          const jitter = ghostJitter(
            entry.record?.episode ?? entry.index ?? overlayIndex,
          );
          const trailSamples = samplesForTrail(
            samples,
            baseFrame,
            trailLengthFrames(),
          )
            .map((sample) => sampleToScreen(sample, base, cameraOrigin, jitter))
            .filter(Boolean);

          if (trailSamples.length > 1) {
            ghostDrawContext.strokeStyle = hexToRgba(color, opacity * 0.42);
            ghostDrawContext.lineWidth = 1.2;
            ghostDrawContext.beginPath();
            let drawing = false;
            let previous;
            for (const point of trailSamples) {
              if (
                !previous ||
                Math.abs(point.trailX - previous.trailX) > 70 ||
                Math.abs(point.trailY - previous.trailY) > 90
              ) {
                ghostDrawContext.moveTo(point.trailX, point.trailY);
                drawing = false;
              } else {
                ghostDrawContext.lineTo(point.trailX, point.trailY);
                drawing = true;
              }
              previous = point;
            }
            if (drawing) {
              ghostDrawContext.stroke();
            }
          }

          const markerSample = sampleAtOrBefore(samples, baseFrame);
          const marker = markerSample
            ? sampleToScreen(markerSample, base, cameraOrigin, jitter)
            : undefined;
          if (marker) {
            const inFinding = isFrameInFinding(
              entry.session,
              markerSample.frame,
            );
            const label = shouldLabelGhost(entry, overlayIndex, labelMode)
              ? overlayLabelForEntry(entry)
              : undefined;
            drawGhostMario(marker.x, marker.y, color, {
              dying: Boolean(markerSample.dying),
              finding: inFinding,
              opacity,
              label,
            });
            if (legendItems.length < 40) {
              legendItems.push({ entry, color, markerSample });
            }
            ghostsDrawn += 1;
          }
        }
        ghostDrawContext.restore();
        ghostOverlay.dataset.ghosts = `${ghostsDrawn}`;
        renderOverlayLegend(legendItems, ghostsDrawn);
      }

      function clearGhostOverlay() {
        ghostContext.clearRect(0, 0, ghostOverlay.width, ghostOverlay.height);
        ghostOverlay.dataset.ghosts = "0";
        if (!isGridMode()) {
          singleRenderer.redrawFrame();
        }
        renderOverlayLegend([], 0);
      }

      function renderOverlayLegend(items, totalGhosts) {
        if (!overlayLegend) {
          return;
        }

        if (!isOverlayMode()) {
          overlayLegend.replaceChildren();
          return;
        }

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "overlay-legend-meta";
          empty.textContent = totalGhosts
            ? "No visible legend entries at this frame."
            : "No overlay ghosts visible at this frame.";
          overlayLegend.replaceChildren(empty);
          return;
        }

        const nodes = items.map(({ entry, color, markerSample }) => {
          const row = document.createElement("div");
          row.className = "overlay-legend-item";

          const swatch = document.createElement("span");
          swatch.className = "overlay-legend-swatch";
          swatch.style.background = color;

          const text = document.createElement("div");
          const title = document.createElement("div");
          title.className = "overlay-legend-title";
          title.textContent = `${overlayLabelForEntry(entry)} ${entry.session.persona || "episode"}`;

          const meta = document.createElement("div");
          meta.className = "overlay-legend-meta";
          const score = Math.round(entry.session.agent?.score ?? 0);
          const progress = displayProgress(entry);
          const now = Number.isFinite(markerSample?.progress)
            ? markerSample.progress
            : "-";
          const findings = entry.session.findings?.length ?? 0;
          meta.textContent = `now ${now} · best ${progress} · score ${score} · bugs ${findings}`;

          text.append(title, meta);
          row.append(swatch, text);
          return row;
        });

        if (totalGhosts > items.length) {
          const extra = document.createElement("div");
          extra.className = "overlay-legend-meta";
          extra.textContent = `Showing ${items.length} legend rows for ${totalGhosts} visible ghosts.`;
          nodes.push(extra);
        }

        overlayLegend.replaceChildren(...nodes);
      }

      function overlayEntries() {
        const limitValue = overlayLimitSelect.value;
        const limit =
          limitValue === "all"
            ? Number.MAX_SAFE_INTEGER
            : Number(limitValue) || 100;
        return sortedSessions
          .filter(
            (entry) =>
              Array.isArray(entry.record?.overlaySamples) &&
              entry.record.overlaySamples.length > 0,
          )
          .slice(0, limit);
      }

      function samplesForTrail(samples, frame, trailLength) {
        const startFrame = Math.max(1, frame - trailLength + 1);
        return samples.filter(
          (sample) => sample.frame >= startFrame && sample.frame <= frame,
        );
      }

      function visibleOverlaySamples(samples, frame) {
        if (!Array.isArray(samples) || !samples.length) {
          return [];
        }

        const firstDeathIndex = samples.findIndex((sample) => sample.dying);
        const lastAllowedIndex =
          firstDeathIndex >= 0 ? firstDeathIndex : samples.length - 1;
        const lastAllowedFrame = samples[lastAllowedIndex]?.frame ?? 0;
        if (frame > lastAllowedFrame) {
          return [];
        }

        return samples.slice(0, lastAllowedIndex + 1);
      }

      function sampleAtOrBefore(samples, frame) {
        let low = 0;
        let high = samples.length - 1;
        let best = -1;
        while (low <= high) {
          const middle = Math.floor((low + high) / 2);
          if ((samples[middle].frame || 0) <= frame) {
            best = middle;
            low = middle + 1;
          } else {
            high = middle - 1;
          }
        }
        return best >= 0 ? samples[best] : samples[0];
      }

      function sampleToScreen(sample, base, cameraOrigin, jitter) {
        if (!sameArea(sample, base)) {
          return undefined;
        }
        const sampleProgress = Number.isFinite(sample.progress)
          ? sample.progress
          : Number.isFinite(sample.currentScreen) && Number.isFinite(sample.x)
            ? sample.currentScreen * 256 + sample.x
            : undefined;
        if (!Number.isFinite(sampleProgress)) {
