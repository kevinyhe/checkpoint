          return undefined;
        }
        const x = sampleProgress - cameraOrigin + jitter.x;
        const y = (Number.isFinite(sample.y) ? sample.y : 0) + jitter.y;
        if (x < -18 || x > 274 || y < -24 || y > 260) {
          return undefined;
        }
        return {
          x,
          y,
          trailX: x + 8,
          trailY: y + 12,
        };
      }

      function cameraOriginForSnapshot(snapshot) {
        if (Number.isFinite(snapshot.cameraOrigin)) {
          return snapshot.cameraOrigin;
        }
        if (
          Number.isFinite(snapshot.currentScreen) &&
          Number.isFinite(snapshot.screenLeftX)
        ) {
          return snapshot.currentScreen * 256 + snapshot.screenLeftX;
        }
        return (snapshot.progress || 0) - (snapshot.xOnScreen || 0);
      }

      function sameArea(sample, base) {
        const hasRawArea =
          Number.isFinite(sample.rawWorld) && Number.isFinite(sample.rawLevel);
        if (hasRawArea) {
          return (
            sample.rawWorld === base.rawWorld &&
            sample.rawLevel === base.rawLevel
          );
        }
        return sample.world === base.world && sample.level === base.level;
      }

      function drawGhostMario(x, y, color, options) {
        const px = Math.round(x);
        const py = Math.round(y);
        const bodyColor = options.dying ? "#ff5a63" : color;
        const overalls = options.dying ? "#4f151d" : "#3676ff";

        ghostDrawContext.save();
        ghostDrawContext.globalAlpha = options.opacity;
        ghostDrawContext.fillStyle = hexToRgba("#000000", 0.35);
        ghostDrawContext.fillRect(px + 2, py + 17, 12, 2);

        ghostDrawContext.fillStyle = bodyColor;
        ghostDrawContext.fillRect(px + 3, py, 9, 3);
        ghostDrawContext.fillRect(px + 5, py - 3, 6, 3);
        ghostDrawContext.fillStyle = "#ffd19a";
        ghostDrawContext.fillRect(px + 4, py + 3, 8, 6);
        ghostDrawContext.fillStyle = bodyColor;
        ghostDrawContext.fillRect(px + 2, py + 9, 12, 4);
        ghostDrawContext.fillStyle = overalls;
        ghostDrawContext.fillRect(px + 3, py + 12, 10, 7);
        ghostDrawContext.fillStyle = bodyColor;
        ghostDrawContext.fillRect(px + 2, py + 19, 5, 4);
        ghostDrawContext.fillRect(px + 9, py + 19, 5, 4);

        if (options.finding) {
          ghostDrawContext.strokeStyle = "#ffffff";
          ghostDrawContext.lineWidth = 1;
          ghostDrawContext.strokeRect(px, py - 4, 16, 28);
        }
        if (options.dying) {
          ghostDrawContext.strokeStyle = "#ffef8a";
          ghostDrawContext.lineWidth = 1.5;
          ghostDrawContext.beginPath();
          ghostDrawContext.moveTo(px, py - 3);
          ghostDrawContext.lineTo(px + 16, py + 23);
          ghostDrawContext.moveTo(px + 16, py - 3);
          ghostDrawContext.lineTo(px, py + 23);
          ghostDrawContext.stroke();
        }
        if (options.label) {
          drawGhostLabel(px + 15, py - 7, options.label, options.opacity);
        }
        ghostDrawContext.restore();
      }

      function drawGhostLabel(x, y, label, opacity) {
        ghostDrawContext.save();
        ghostDrawContext.globalAlpha = Math.min(1, opacity + 0.18);
        ghostDrawContext.font = "8px ui-sans-serif, system-ui, sans-serif";
        ghostDrawContext.textBaseline = "top";
        const width = Math.ceil(ghostDrawContext.measureText(label).width) + 6;
        const clampedX = Math.max(1, Math.min(255 - width, Math.round(x)));
        const clampedY = Math.max(1, Math.min(231, Math.round(y)));
        ghostDrawContext.fillStyle = hexToRgba("#030405", 0.78);
        ghostDrawContext.fillRect(clampedX, clampedY, width, 10);
        ghostDrawContext.strokeStyle = hexToRgba("#ffffff", 0.55);
        ghostDrawContext.lineWidth = 0.75;
        ghostDrawContext.strokeRect(
          clampedX + 0.5,
          clampedY + 0.5,
          width - 1,
          9,
        );
        ghostDrawContext.fillStyle = "#ffffff";
        ghostDrawContext.fillText(label, clampedX + 3, clampedY + 1);
        ghostDrawContext.restore();
      }

      function shouldLabelGhost(entry, overlayIndex, mode) {
        if (mode === "off") {
          return false;
        }
        if (mode === "selected") {
          return entry.session === currentSession;
        }
        if (mode === "all") {
          return true;
        }
        return overlayIndex < 25;
      }

      function overlayLabelForEntry(entry) {
        const episode =
          entry.record?.episode ??
          entry.session.agent?.episode ??
          entry.index + 1;
        return `#${episode}`;
      }

      function colorForEpisode(seed) {
        const hue = Math.abs(Number(seed) * 47) % 360;
        return hslToHex(hue, 86, 62);
      }

      function ghostJitter(seed) {
        const value = Math.abs(Number(seed) || 0);
        const angle = (value * 137.508 * Math.PI) / 180;
        const radius = 0.6 + (value % 5) * 0.38;
        return {
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
        };
      }

      function trailLengthFrames() {
        return Number(trailLengthSelect.value) || 120;
      }

      function isFrameInFinding(session, frame) {
        return (session.findings || []).some(
          (finding) => finding.frameStart <= frame && finding.frameEnd >= frame,
        );
      }

      function hslToHex(hue, saturation, lightness) {
        const s = saturation / 100;
        const l = lightness / 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const hp = hue / 60;
        const x = c * (1 - Math.abs((hp % 2) - 1));
        let [r, g, b] = [0, 0, 0];
        if (hp >= 0 && hp < 1) [r, g, b] = [c, x, 0];
        else if (hp < 2) [r, g, b] = [x, c, 0];
        else if (hp < 3) [r, g, b] = [0, c, x];
        else if (hp < 4) [r, g, b] = [0, x, c];
        else if (hp < 5) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        const m = l - c / 2;
        return `#${[r, g, b]
          .map((channel) =>
            Math.round((channel + m) * 255)
              .toString(16)
              .padStart(2, "0"),
          )
          .join("")}`;
      }

      function hexToRgba(hex, alpha) {
        const value = hex.replace("#", "");
        const red = parseInt(value.slice(0, 2), 16);
        const green = parseInt(value.slice(2, 4), 16);
        const blue = parseInt(value.slice(4, 6), 16);
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function updateGridSummary() {
        const source = run.discovery?.episodeLog?.episodes
          ? `${run.discovery.episodeLog.episodes} saved sidecar episodes`
          : "saved top sessions only";
        const start = sortedSessions.length ? gridOffset + 1 : 0;
        const end = Math.min(sortedSessions.length, gridOffset + gridSize());
        if (isGridMode()) {
          gridSummary.textContent = `Grid replay mode: showing ${start}-${end} of ${sortedSessions.length} episodes from ${source}. Each tile is its own synced emulator replay.`;
          return;
        }
        if (isOverlayMode()) {
          const ghostCount = overlayEntries().length;
          gridSummary.textContent = `Overlay trail mode: drawing up to ${ghostCount} synced ghost Marios from ${source} over the selected base replay.`;
          return;
        }
        gridSummary.textContent = `Single replay mode. ${sortedSessions.length} episodes are available for selection.`;
      }

      function updateBatchButtons() {
        const gridMode = isGridMode();
        prevBatchButton.disabled = !gridMode || gridOffset <= 0;
        nextBatchButton.disabled = !gridMode || gridOffset >= maxGridOffset();
        updateGridSummary();
      }

      function selectedGridPlayer() {
        return (
          gridPlayers.find((player) => player.session === currentSession) ||
          gridPlayers[0]
        );
      }

      function shortGridLabel(entryOrSession, index) {
        const session = entryOrSession.session || entryOrSession;
        if (session.agent) {
          const adjusted = displayScore(entryOrSession);
          const rawScore = Number(session.agent.score ?? 0);
          const score =
            session.metrics?.deaths > 0 &&
            Math.round(adjusted) !== Math.round(rawScore)
              ? `${Math.round(adjusted)} raw ${rawScore}`
              : `${rawScore}`;
          return `#${session.agent.episode ?? index + 1} · score ${score}`;
        }
        return `${index + 1}. ${session.persona || "session"}`;
      }

      function gridMeta(entryOrSession) {
        const session = entryOrSession.session || entryOrSession;
        const progress = displayProgress(entryOrSession);
        const findings = session.findings?.length ?? 0;
        const bugScore = session.agent?.bugScore ?? 0;
        const coverageScore = session.agent?.coverageScore ?? 0;
        const routeScore = session.agent?.routeScore ?? 0;
        const goals = new Set(session.agent?.coverageGoalsHit || []).size;
        const gameScore = session.agent?.gameScoreDelta ?? 0;
        const rooms = session.agent?.roomTransitions ?? 0;
        const phase = session.agent?.phase ? ` · ${session.agent.phase}` : "";
        const parent = session.agent?.parentId
          ? ` · parent ${session.agent.parentId}`
          : "";
        return `progress ${progress} · ${Math.round((session.metrics?.frames || 0) / 60)}s · route ${Math.round(routeScore)} · game +${gameScore} · rooms ${rooms} · bugs ${findings} · coverage ${coverageScore}/${goals}${phase}${parent}`;
      }

      function fastestMilestoneFrame(session) {
        const frames = Object.values(
          session.agent?.milestoneFrames || {},
        ).filter((frame) => Number.isFinite(frame));
        return frames.length ? Math.min(...frames) : Number.MAX_SAFE_INTEGER;
      }

      function displayProgress(entryOrSession) {
        const session = entryOrSession.session || entryOrSession;
        const record = entryOrSession.record;
        const metricProgress = session.metrics?.maxProgress ?? 0;
        const agentProgress = Math.max(
          session.agent?.progressDelta ?? 0,
          session.agent?.obstacleProgress ?? 0,
          progressFromMilestones(session.agent?.milestoneFrames || {}),
        );
        const overlayProgress = Array.isArray(record?.overlaySamples)
          ? record.overlaySamples.reduce((max, sample) => {
              const progress = Number.isFinite(sample.progress)
                ? sample.progress
                : 0;
              return Math.max(max, progress);
            }, 0)
          : 0;
        return Math.max(metricProgress, agentProgress, overlayProgress);
      }

      function displayScore(entryOrSession) {
        const session = entryOrSession.session || entryOrSession;
        const rawScore = Number(session.agent?.score ?? 0);
        if (!session.metrics || (session.metrics.deaths ?? 0) <= 0) {
          return rawScore;
        }

        const findings = session.findings || [];
        const bugScore = Number(session.agent?.bugScore ?? 0);
        const meaningfulBug =
          bugScore >= 100 ||
          findings.some(
            (finding) =>
              finding.severity === "high" ||
              finding.type === "emulator-error" ||
              finding.type === "impossible-transition" ||
              finding.type === "wrong-warp-candidate",
          );
        const progress = displayProgress(entryOrSession);
        if (meaningfulBug) {
          return Math.max(
            0,
            Math.min(
              rawScore * 0.58 - session.metrics.deaths * 140,
              progress * 1.1 + bugScore * 4 + 700,
            ),
          );
        }

        return Math.max(
          0,
          Math.min(
            rawScore * 0.22 - session.metrics.deaths * 360,
            progress * 0.55 + 380,
          ),
        );
      }

      function progressFromMilestones(milestoneFrames) {
        let progress = 0;
        for (const key of Object.keys(milestoneFrames)) {
          const match = /^progress-(\d+)$/.exec(key);
          if (match) {
            progress = Math.max(progress, Number(match[1]) || 0);
          }
        }
        return progress;
      }

      function readSnapshot(emulator) {
        const memory = emulator && emulator.cpu && emulator.cpu.mem;
        if (!memory) {
          return {
            rawWorld: 0,
            rawLevel: 0,
            world: 0,
            level: 0,
            playerState: 0,
            playerStateName: "unknown",
            currentScreen: 0,
            nextScreen: 0,
            screenLeftX: 0,
            cameraOrigin: 0,
            xOnScreen: 0,
            yOnScreen: 0,
            levelPage: 0,
            progress: 0,
            horizontalSpeed: 0,
            horizontalSpeedAbs: 0,
            verticalVelocity: 0,
            lives: 0,
            coins: 0,
            score: 0,
            gameTimer: 0,
            gameMode: 0,
            levelLoading: 0,
            levelEntry: 0,
            scrollLock: 0,
            scrollAmount: 0,
            areaOffset: 0,
            areaMusic: 0,
            playerCollisionBits: 0xff,
            enemyCollisionBits: 0,
            playerHitDetectFlag: 0,
            warpZoneControl: 0,
            changeAreaTimer: 0,
            enemyTypes: [],
            vineTileCount: 0,
            pipeTileCount: 0,
            hiddenBlockTileCount: 0,
            onVine: false,
            enteringPipe: false,
            dying: false,
            vineVisible: false,
            warpZoneVisible: false,
            pipeInteraction: false,
            roomId: "unknown",
          };
        }
        const enemyTypes = readBytes(memory, SMB_RAM.enemyTypes, 5);
        const playerState = readByte(memory, SMB_RAM.playerState);
        const soundEffect2 = readByte(memory, SMB_RAM.soundEffect2);
        const soundEffect3 = readByte(memory, SMB_RAM.soundEffect3);
        const eventMusic = readByte(memory, SMB_RAM.eventMusic);
        const deathMusicLoaded = readByte(memory, SMB_RAM.deathMusicLoaded);
        const currentScreen = readByte(memory, SMB_RAM.currentScreen);
        const levelPage = readByte(memory, SMB_RAM.levelPage);
        const xOnScreen = readByte(memory, SMB_RAM.xOnScreen);
        const rawWorld = readByte(memory, SMB_RAM.world);
        const rawLevel = readByte(memory, SMB_RAM.level);
        const vineTileCount = countTiles(memory, VINE_TILES);
        const pipeTileCount = countTiles(memory, PIPE_TILES);
        const hiddenBlockTileCount = countTiles(memory, HIDDEN_BLOCK_TILES);
        const warpZoneControl = readByte(memory, SMB_RAM.warpZoneControl);
        const changeAreaTimer = readByte(memory, SMB_RAM.changeAreaTimer);
        const onVine = playerState === 0x01;
        const enteringPipe =
          playerState === 0x02 ||
          playerState === 0x03 ||
          (soundEffect3 & 0x10) !== 0;
        const dying =
          playerState === 0x06 ||
          playerState === 0x0b ||
          deathMusicLoaded !== 0 ||
          (eventMusic & 0x01) !== 0;
        const vineVisible =
          onVine ||
          enemyTypes.includes(0x2f) ||
          (soundEffect2 & 0x04) !== 0 ||
          vineTileCount > 0;
        const warpZoneVisible =
          enemyTypes.includes(0x34) || warpZoneControl !== 0;
        const pipeInteraction =
          enteringPipe || changeAreaTimer !== 0 || pipeTileCount > 0;
        const areaOffset = readByte(memory, SMB_RAM.areaOffset);
        const areaMusic = readByte(memory, SMB_RAM.areaMusic);
        const levelEntry = readByte(memory, SMB_RAM.levelEntry);
        return {
          rawWorld,
          rawLevel,
          world: rawWorld + 1,
          level: rawLevel + 1,
          playerState,
          playerStateName:
            PLAYER_STATES.get(playerState) || `unknown-${playerState}`,
          currentScreen,
          nextScreen: readByte(memory, SMB_RAM.nextScreen),
          screenLeftX: readByte(memory, SMB_RAM.screenLeftX),
          cameraOrigin:
            currentScreen * 256 + readByte(memory, SMB_RAM.screenLeftX),
          levelPage,
          xOnScreen,
          yOnScreen: readByte(memory, SMB_RAM.yOnScreen),
          progress: levelPage * 256 + xOnScreen,
          horizontalSpeed: toSignedByte(
            readByte(memory, SMB_RAM.horizontalSpeed),
          ),
          horizontalSpeedAbs: readByte(memory, SMB_RAM.horizontalSpeedAbs),
          verticalVelocity: toSignedByte(
            readByte(memory, SMB_RAM.verticalVelocity),
          ),
          lives: readByte(memory, SMB_RAM.lives),
          coins: readByte(memory, SMB_RAM.preLevel),
          score: readScore(memory),
          gameTimer: readGameTimer(memory),
          gameMode: readByte(memory, SMB_RAM.gameMode),
          levelLoading: readByte(memory, SMB_RAM.levelLoading),
          levelEntry,
          scrollLock: readByte(memory, SMB_RAM.scrollLock),
          scrollAmount: readByte(memory, SMB_RAM.scrollAmount),
          areaOffset,
          areaMusic,
          eventMusic,
          playerCollisionBits: readByte(memory, SMB_RAM.playerCollisionBits),
          enemyCollisionBits: readByte(memory, SMB_RAM.enemyCollisionBits),
          playerHitDetectFlag: readByte(memory, SMB_RAM.playerHitDetectFlag),
          warpZoneControl,
          changeAreaTimer,
          enemyTypes,
          vineTileCount,
          pipeTileCount,
          hiddenBlockTileCount,
          onVine,
          enteringPipe,
          dying,
          vineVisible,
          warpZoneVisible,
          pipeInteraction,
          roomId: `w${rawWorld + 1}-${rawLevel + 1}|a${areaOffset}|m${areaMusic}|e${levelEntry}`,
        };
      }

      function readByte(memory, address) {
        return memory[address & 0x07ff] || 0;
      }

      function readBytes(memory, address, length) {
        return Array.from({ length }, (_, offset) =>
          readByte(memory, address + offset),
        );
      }

      function countTiles(memory, tileSet) {
        let count = 0;
        for (
          let address = SMB_RAM.tileBase;
          address <= SMB_RAM.tileEnd;
          address += 1
        ) {
          if (tileSet.has(readByte(memory, address))) {
            count += 1;
          }
        }
        return count;
      }

      function readGameTimer(memory) {
        return (
          digit(readByte(memory, SMB_RAM.gameTimerHundreds)) * 100 +
          digit(readByte(memory, SMB_RAM.gameTimerTens)) * 10 +
          digit(readByte(memory, SMB_RAM.gameTimerOnes))
        );
      }

      function readScore(memory) {
        const placeValues = [1000000, 100000, 10000, 1000, 100, 10];
        return placeValues.reduce(
          (score, placeValue, offset) =>
            score +
            digit(readByte(memory, SMB_RAM.scoreStart + offset)) * placeValue,
          0,
        );
      }

      function digit(value) {
        return value & 0x0f;
      }

      function toSignedByte(value) {
        return value >= 0x80 ? value - 0x100 : value;
      }

      function hexByte(value) {
        if (!Number.isFinite(value)) {
          return "--";
        }
        return `0x${(value & 0xff).toString(16).padStart(2, "0")}`;
      }

      function maxReplayFrame(inputs) {
        return inputs.reduce(
          (maxFrame, range) => Math.max(maxFrame, range.frameEnd || 0),
          0,
        );
      }

      function maxVisibleGridFrame() {
        return gridPlayers.reduce(
          (maxFrame, player) => Math.max(maxFrame, player.totalFrames),
          0,
        );
      }

      function gridSize() {
        return Number(gridSizeSelect.value) || 12;
      }

      function maxGridOffset() {
        if (sortedSessions.length === 0) {
          return 0;
        }
        return (
          Math.floor((sortedSessions.length - 1) / gridSize()) * gridSize()
        );
      }

      function isGridMode() {
        return viewModeSelect.value === "grid";
      }

      function isOverlayMode() {
        return viewModeSelect.value === "overlay";
      }

      function pill(text) {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = text;
        return span;
      }

      function setStatus(message, tone) {
        statusLine.textContent = message;
        statusLine.className = `status-line ${tone || ""}`;
      }
    </script>
  </body>
</html>
